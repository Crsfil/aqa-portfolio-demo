name: Test Suite

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Start demo app
        working-directory: construction-demo-app
        run: |
          npm start &
          sleep 3

      - name: Run all tests
        working-directory: java-aqa-demo-framework
        run: gradle clean test -DbaseUrl=http://localhost:3000 -Dheadless=true
